<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ArquivistaPB</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      text-align: center;
      padding-top: 80px;
    }

    h1 {
      font-size: 40px;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      margin: 20px auto;
      width: 300px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: #334155;
      transform: scale(1.05);
    }

    .btn {
      margin-top: 30px;
      background: #2563eb;
      padding: 15px 30px;
      border-radius: 8px;
      display: inline-block;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>ArquivistaPB</h1>
  <p class="subtitle">Trilha Arquivística</p>

  <div class="card">Fundamentos Arquivísticos</div>
  <div class="card">Uso do PBDoc</div>
  <div class="card">Conformidade Legal</div>

  <div class="btn">Iniciar Trilha</div>
</div>

</body>
</html>
