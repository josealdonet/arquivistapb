<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ArquivistaPB</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f1c3f, #1e3a8a);
  color: white;
  text-align: center;
}

.container {
  padding-top: 80px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitle {
  opacity: 0.8;
  margin-bottom: 50px;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 12px;
  width: 260px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.2);
}

.card h3 {
  margin-bottom: 10px;
}

.btn {
  margin-top: 50px;
  display: inline-block;
  background: #ff6a00;
  padding: 18px 40px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #ff8500;
}
</style>

</head>

<body>

<div class="container">
  <h1>ArquivistaPB</h1>
  <p class="subtitle">Plataforma de Capacitação em Gestão Documental e Uso do PBDoc</p>

  <div class="cards">
    <div class="card">
      <h3>📘 Cenários Reais</h3>
      <p>Desafios baseados em situações práticas</p>
    </div>

    <div class="card">
      <h3>🎯 Progressão</h3>
      <p>Avance por trilhas e desbloqueie níveis</p>
    </div>

    <div class="card">
      <h3>🏆 Maturidade</h3>
      <p>Avalie e evolua a conformidade arquivística</p>
    </div>
  </div>

  <div class="btn">Iniciar Trilha</div>
</div>

</body>
</html>
